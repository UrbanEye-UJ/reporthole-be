jasypt:
  encryptor:
    algorithm: PBEWITHHMACSHA512ANDAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator
    password: ${JASYPT_ENCRYPTOR_PASSWORD}

logging:
  level:
    org.springdoc: DEBUG
#    org.springframework.security: DEBUG

management:
  endpoints:
    health:
      show-details: always
    web:
      exposure:
        include: health, info, metrics, env

server:
  servlet:
    context-path: /api/

