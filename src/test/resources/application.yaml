logging:
  level:
    org.springdoc: DEBUG

management:
  endpoints:
    health:
      show-details: always
    web:
      exposure:
        include: health, info, metrics, env

server:
  servlet:
    context-path: /api/

spring:
  application:
    name: reporthole-be
  profiles:
    active: local

web:
  aes:
    key: test-aes-key-123456
  jwt:
    key: test-jwt-secret-key-123456
    expiration: 86400000