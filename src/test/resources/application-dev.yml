spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/reporthole_dev
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

services:
  web:
    allowed:
      - http://localhost:3000,
      - http://192.168.*:3000,
      - http://10.*:3000,
      - http://172.*:3000